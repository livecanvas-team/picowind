<section class="bg-base-100 py-20">
  <div class="container mx-auto px-4 lg:px-8">
    <div class="grid grid-cols-1 gap-10 lg:grid-cols-2">
      <div>
        <p editable="inline" class="mb-3 text-sm uppercase tracking-[0.2em] text-base-content/60">Contact</p>
        <h1 editable="inline" class="mb-4 text-4xl font-bold md:text-5xl">Talk with the  team</h1>
        <p editable="inline" class="text-base text-base-content/70">Need product guidance, reseller details, or technical support? Send us a message and we will respond within one business day.</p>
      </div>

      <div class="card border border-base-300 bg-base-100 shadow-sm">
        <div class="card-body">
          <label class="form-control w-full">
            <span editable="inline" class="label-text mb-2">Your name</span>
            <input type="text" class="input input-bordered w-full" placeholder="Name">
          </label>
          <label class="form-control w-full">
            <span editable="inline" class="label-text mb-2">Email</span>
            <input type="email" class="input input-bordered w-full" placeholder="you@example.com">
          </label>
          <label class="form-control w-full">
            <span editable="inline" class="label-text mb-2">Message</span>
            <textarea class="textarea textarea-bordered w-full" rows="5" placeholder="How can we help?"></textarea>
          </label>
          <button class="btn btn-primary mt-2">Send message</button>
        </div>
      </div>
    </div>
  </div>
</section>
