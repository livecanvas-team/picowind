<section class="mx-auto max-w-6xl px-4 py-12 sm:px-6 lg:px-8 md:py-20">
  <div class="grid grid-cols-1 gap-10 lg:grid-cols-2 lg:gap-20">
    <div>
      <div class="mb-6 inline-flex items-center gap-2 rounded-full border border-base-300 bg-base-200 px-4 py-1.5 text-sm">
        <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-4 w-4 text-base-content/60" fill="currentColor"><path d="M9 21h6v-1H9v1zm3-19a7 7 0 00-4 12.75V18h8v-3.25A7 7 0 0012 2zm2 14h-4v-2.25l-.39-.3A5 5 0 1114.4 13.7l-.4.3V16z"/></svg>
        <span editable="inline" class="font-medium text-base-content">Contact us</span>
      </div>

      <h1 editable="inline" class="mb-5 text-3xl font-bold text-base-content md:text-4xl">24/7 Human Support</h1>

      <p editable="inline" class="mb-8 max-w-md text-sm leading-relaxed text-base-content/70 md:text-base">
        Reach  by email, phone, or the form on this page. Our support and success team responds quickly with practical answers.
      </p>

      <div class="flex flex-col gap-4">
        <div class="flex items-center gap-3 text-sm md:text-base">
          <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5 text-base-content/60" fill="currentColor"><path d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 4l-8 5L4 8V6l8 5 8-5v2z"/></svg>
          <span editable="inline" class="text-base-content">support@.audio</span>
        </div>
        <div class="flex items-center gap-3 text-sm md:text-base">
          <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5 text-base-content/60" fill="currentColor"><path d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 011 1V20a1 1 0 01-1 1C10.75 21 3 13.25 3 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.46.57 3.58a1 1 0 01-.24 1.01l-2.2 2.2z"/></svg>
          <span editable="inline" class="text-base-content">+1 800 219 4420</span>
        </div>
      </div>
    </div>

    <div class="rounded-2xl border border-base-300 bg-base-100 p-6 shadow-lg md:p-8">
      <h2 editable="inline" class="mb-1 text-xl font-bold text-base-content md:text-2xl">Write us</h2>
      <p editable="inline" class="mb-6 text-sm text-base-content/60">Tell us what you need and we will get back shortly.</p>

      <form class="space-y-4">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label editable="inline" class="mb-1 block text-sm font-medium text-base-content/80">First name</label>
            <input type="text" placeholder="Ava" class="input input-bordered h-10 w-full rounded-lg border-base-300 bg-base-100 text-sm">
          </div>
          <div>
            <label editable="inline" class="mb-1 block text-sm font-medium text-base-content/80">Last name</label>
            <input type="text" placeholder="Walker" class="input input-bordered h-10 w-full rounded-lg border-base-300 bg-base-100 text-sm">
          </div>
        </div>

        <div>
          <label editable="inline" class="mb-1 block text-sm font-medium text-base-content/80">Email</label>
          <input type="email" placeholder="ava@example.com" class="input input-bordered h-10 w-full rounded-lg border-base-300 bg-base-100 text-sm">
        </div>

        <div>
          <label editable="inline" class="mb-1 block text-sm font-medium text-base-content/80">Your message</label>
          <textarea placeholder="Tell us about your project or issue..." rows="4" class="textarea textarea-bordered w-full resize-none rounded-lg border-base-300 bg-base-100 text-sm"></textarea>
        </div>

        <button type="submit" class="btn btn-neutral w-full rounded-lg text-neutral-content">Submit</button>
      </form>
    </div>
  </div>
</section>
