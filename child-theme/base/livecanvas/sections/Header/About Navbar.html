<header class="sticky top-0 z-50 border-b border-base-300 bg-base-100">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
    <div editable="inline" class="text-xl font-black tracking-wider"></div>

    <nav class="hidden items-center gap-6 text-sm md:flex">
      <a editable="inline" href="#" class="hover:text-primary">Product</a>
      <a editable="inline" href="#" class="hover:text-primary">Specifications</a>
      <a editable="inline" href="#" class="font-semibold underline underline-offset-4">About</a>
      <a editable="inline" href="#" class="hover:text-primary">Pricing</a>
      <a editable="inline" href="#" class="hover:text-primary">Contact</a>
    </nav>

    <div class="flex items-center gap-3">
      <label class="swap btn btn-ghost btn-circle btn-sm" aria-label="Toggle theme">
        <input type="checkbox" class="theme-controller" value="dark">
        <span class="swap-off">
          <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </span>
        <span class="swap-on">
          <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-4 w-4" fill="currentColor"><path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 1 0 11.5 11.5z"/></svg>
        </span>
      </label>
      <a editable="inline" href="#" class="btn btn-sm btn-outline rounded-full text-xs">Buy now</a>
    </div>

    <div class="md:hidden">
      <button class="btn btn-ghost btn-sm" aria-label="Menu">
        <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5" fill="currentColor"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
      </button>
    </div>
  </div>
</header>
