<header class="sticky top-0 z-50 border-b border-base-300 bg-base-100">

        </span>
        <span class="swap-on">

      <a editable="inline" href="#" class="btn btn-sm btn-outline hidden rounded-full border-base-300 px-5 text-base-content hover:border-base-content hover:bg-base-content hover:text-base-100 md:inline-flex">
        Buy now
        <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="ml-1 h-3 w-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>

      <div class="dropdown dropdown-end md:hidden">
        <label tabindex="0" class="btn btn-ghost btn-sm" aria-label="Open menu">
          <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-5 w-5" fill="currentColor"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
        </label>
        <ul tabindex="0" class="dropdown-content menu z-50 mt-2 w-52 rounded-box bg-base-100 p-4 shadow-lg">
          <li><a editable="inline" href="#" class="text-base-content/80">Product</a></li>
          <li><a editable="inline" href="#" class="text-base-content/80">Specifications</a></li>
          <li><a editable="inline" href="#" class="text-base-content/80">About</a></li>
          <li><a editable="inline" href="#" class="font-semibold text-base-content">Pricing</a></li>
          <li><a editable="inline" href="#" class="text-base-content/80">Contact</a></li>
          <li class="mt-2">

              Buy now
              <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-3 w-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </a>
          </li>
        </ul>

    </div>
