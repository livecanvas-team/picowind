<header class="relative bg-neutral text-center text-sm text-neutral-content py-2">
  <label class="swap btn btn-ghost btn-xs absolute left-4 top-1/2 -translate-y-1/2 text-neutral-content" aria-label="Toggle theme">
    <input type="checkbox" class="theme-controller" value="dark">
    <span class="swap-off">
      <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </span>
    <span class="swap-on">
      <svg lc-helper="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="h-4 w-4" fill="currentColor"><path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 1 0 11.5 11.5z"/></svg>
    </span>
  </label>
  <span editable="inline">Purchase the  specification kit on .design</span>
  <a editable="inline" href="#" class="btn btn-sm btn-outline border-neutral-content text-neutral-content ml-3 rounded-full text-xs">Get Template</a>
  <button class="absolute right-4 top-1/2 -translate-y-1/2 text-neutral-content" aria-label="Close">x</button>
</header>
